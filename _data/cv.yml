    Projects:
      - name: VLA Latent Space Investigation
        start_date: 2026-01-01
        end_date: 2026-01-01
        summary: >
          Following an existing paper, I set up a failure detection system for the
          VLA based on the VLA internal features. Then, I wondered if those features
          are only informative or can also be controlled in some way: I investigated
          some ways to intervene in the latent space to reduce the failure cases.

      - name: Advantage Conditioned VLA Learning
        start_date: 2025-12-01
        end_date: 2025-12-01
        summary: >
          After training a VLA, I collected rollouts and, following an existing work,
          I passed the frames to a pretrained VLM to predict value labels in a
          zero-shot manner. Then, I converted those values in advantages and retrained
          the VLM conditioning on those advantages. However, after inspection, the
          quality of the produced annotation was too poor and noisy to yield
          performance improvements.

