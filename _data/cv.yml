cv:
  name: Luca Nunziante
  label: Robot Learning Researcher
  email: luca.nunziante1999@gmail.com
  location: Tokyo, Japan
  image: ""
  summary: >
    Robot learning researcher working on Vision-Language-Action (VLA) models and
    imitation/reinforcement learning for manipulation, with hands-on experience
    taking policies from simulation to real-world deployment on physical robots.
    Comfortable across the full stack: low-level control, teleoperation and data
    collection, model training, and deployment infrastructure.

  social_networks:
    - network: GitHub
      username: lucanunz
    - network: LinkedIn
      username: luca-nunziante

  sections:
    Experience:
      - company: Araya Inc.
        position: Robot Learning Researcher
        location: Tokyo, Japan
        start_date: 2024-06-01
        end_date: present
        highlights:
          - Develop imitation learning and reinforcement learning pipelines for robot manipulation built on VLA models.
          - Built end-to-end training infrastructure for IL and RL on custom datasets, improving manipulation success rate by iterating and fixing edge cases encountered during deployment.
          - Implemented low-level controllers (operational-space, CBF-based) and teleoperation interfaces enabling safe data collection and reliable real-world policy execution.
          - Built custom MuJoCo simulation environments and the deployment infrastructure that transfers trained policies to physical hardware.

      - company: Tohoku University
        position: Visiting Research Student
        location: Sendai, Japan
        start_date: 2023-12-01
        end_date: 2024-04-01
        highlights:
          - Developed compliant control methods for robotic assembly tasks and perception systems for lunar applications.
          - Built a dual-arm solar-panel assembly pipeline (MSc thesis project) that led to a peer-reviewed publication (SII 2025).

    Education:
      - institution: Sapienza University of Rome
        location: Rome, Italy
        url: https://www.uniroma1.it/en
        area: Artificial Intelligence and Robotics
        studyType: MSc
        start_date: 2021
        end_date: 2024
        score: "110/110 cum laude"
        highlights:
          - "Thesis: Autonomous Assembly of Solar Panels by Dual Robot Arms in the Remote Space (Supervisors: Prof. A. De Luca, Prof. K. Yoshida)."

      - institution: University of Campania Luigi Vanvitelli
        location: Caserta, Italy
        url: https://www.unicampania.it/
        area: Electronic and Computer Engineering
        studyType: BSc
        start_date: 2018
        end_date: 2021
        score: "110/110 cum laude"
        highlights:
          - "Thesis: Object detection with Neural Networks for robotics applications: training methods compared (Supervisor: Prof. C. Natale)."

    Projects:
      - name: Resolving Uncertainty in Robotic Manipulation with Vision-Language Models and Conformal Prediction
        start_date: 2025-11-01
        end_date: 2025-11-01
        summary: >
          A Vision Language Model is employed for robot planning, and response
          uncertainty is quantified using Conformal Prediction. The resulting plans
          are executed using an imitation learning policy. A user interface was also
          developed to facilitate interaction with a real robot.

